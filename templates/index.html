<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Voice Translator Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            color: white;
        }
        h1 {
            text-align: center;
            padding: 20px;
            font-size: 2rem;
            background: linear-gradient(90deg, #e94560, #4ecca3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            padding-bottom: 15px;
            font-size: 1rem;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 100px);
            border: none;
            display: block;
        }
        .offline-msg {
            text-align: center;
            padding: 100px 20px;
            display: none;
        }
        .offline-msg h2 { color: #e94560; font-size: 2rem; margin-bottom: 15px; }
        .offline-msg p { color: #aaa; font-size: 1.1rem; }
        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🎙️ Voice Translator Pro</h1>
    <p class="subtitle">Apni awaaz do → Language chuno → Cloned voice mein translation pao!</p>

    <div class="offline-msg" id="offlineMsg">
        <h2>⚠️ Tool Abhi Offline Hai</h2>
        <p>Thodi der mein dobara try karo.</p>
        <button class="btn" onclick="window.location.reload()">🔄 Reload Karo</button>
    </div>

    <iframe id="toolFrame" src="" allowfullscreen></iframe>

    <script>
        fetch("/api/status")
            .then(r => r.json())
            .then(data => {
                if (data.active && data.kaggle_url) {
                    document.getElementById("toolFrame").src = data.kaggle_url;
                } else {
                    document.getElementById("toolFrame").style.display = "none";
                    document.getElementById("offlineMsg").style.display = "block";
                }
            })
            .catch(() => {
                document.getElementById("toolFrame").style.display = "none";
                document.getElementById("offlineMsg").style.display = "block";
            });
    </script>
</body>
</html>
