<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Voice Translator Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container { width: 100%; max-width: 900px; padding: 20px; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #4ecca3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 1.1rem; }
        .status-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #e94560; }
        .status-dot.active { background: #4ecca3; }
        .frame-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        iframe { width: 100%; height: 700px; border: none; border-radius: 12px; }
        .offline-msg { text-align: center; padding: 60px 20px; }
        .offline-msg h2 { color: #e94560; margin-bottom: 15px; font-size: 1.8rem; }
        .offline-msg p { color: #aaa; line-height: 1.8; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(90deg, #e94560, #c73652);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Voice Translator Pro</h1>
        <p class="subtitle">Apni awaaz do → Language chuno → Cloned voice mein translation pao!</p>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Checking status...</span>
        </div>

        <div class="frame-container">
            <div class="offline-msg" id="offlineMsg" style="display:none">
                <h2>⚠️ Tool Abhi Offline Hai</h2>
                <p>Thodi der mein dobara try karo.</p>
                <button class="btn" onclick="manualCheck()">🔄 Check Karo</button>
            </div>
            <iframe id="toolFrame" src="" style="display:none"></iframe>
        </div>
    </div>

    <script>
        // State track karo
        let currentUrl = "";
        let isLoaded = false;
        let checkInterval = null;

        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        const frame = document.getElementById("toolFrame");
        const offline = document.getElementById("offlineMsg");

        function setActive(url) {
            dot.classList.add("active");
            text.textContent = "✅ Tool Active — Use Karo!";
            offline.style.display = "none";

            // CRITICAL: Sirf tab load karo jab URL badla ho
            if (url !== currentUrl) {
                currentUrl = url;
                frame.src = url;
                frame.style.display = "block";
                isLoaded = true;
            }
        }

        function setOffline() {
            dot.classList.remove("active");
            text.textContent = "❌ Tool Offline Hai";
            // Frame band karo sirf jab actually offline ho
            if (isLoaded) {
                frame.style.display = "none";
                offline.style.display = "block";
                currentUrl = "";
                isLoaded = false;
            } else {
                offline.style.display = "block";
            }
        }

        function checkStatus() {
            fetch("/api/status")
                .then(r => r.json())
                .then(data => {
                    if (data.active && data.kaggle_url) {
                        setActive(data.kaggle_url);
                    } else {
                        setOffline();
                    }
                })
                .catch(() => {
                    text.textContent = "⚠️ Connection Error";
                });
        }

        function manualCheck() {
            text.textContent = "Checking...";
            checkStatus();
        }

        // Pehli baar check karo
        checkStatus();

        // Har 60 seconds mein check karo (30 se badha ke 60 kiya)
        checkInterval = setInterval(checkStatus, 60000);
    </script>
</body>
</html>
